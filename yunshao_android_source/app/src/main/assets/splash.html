<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>云梢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Noto+Sans+SC:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#f5f6f8;--accent:#4f8cff;--text-primary:#1a1a2e;--text-muted:#9a9ab0;--track-bg:#e2e5ee;--grid-color:rgba(0,0,0,.04)}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Noto Sans SC','Outfit',sans-serif}
  .splash{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}

  /* 网格背景 */
  .bg-grid{
    position:absolute;inset:0;
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size:32px 32px;
    opacity:0;
    animation:fadeIn 1s ease .2s forwards;
  }

  /* 光晕 */
  .bg-glow{position:absolute;width:240px;height:240px;border-radius:50%;filter:blur(80px);opacity:0;animation:glowIn 1.8s ease .3s forwards}
  .bg-glow-1{top:20%;right:-30px;background:radial-gradient(circle,rgba(79,140,255,.1),transparent 70%)}
  .bg-glow-2{bottom:24%;left:-40px;background:radial-gradient(circle,rgba(120,90,255,.07),transparent 70%);animation-delay:.5s}

  .logo-icon{
    width:140px;height:140px;
    margin-bottom:24px;
    opacity:0;
    transform:translateY(18px) scale(.92);
    animation:logoEnter .8s cubic-bezier(.16,1,.3,1) .2s forwards;
  }
  .logo-icon img{width:100%;height:100%;object-fit:cover;border-radius:24px}

  .brand-name{
    font-family:'Outfit','Noto Sans SC',sans-serif;
    font-size:28px;font-weight:700;letter-spacing:5px;
    color:var(--text-primary);
    opacity:0;transform:translateY(12px);
    animation:textIn .7s cubic-bezier(.16,1,.3,1) .5s forwards;
  }
  .brand-tagline{
    font-size:11px;font-weight:300;letter-spacing:8px;
    color:var(--text-muted);margin-top:6px;text-transform:uppercase;
    opacity:0;animation:textIn .7s cubic-bezier(.16,1,.3,1) .75s forwards;
  }
  .loader-wrap{position:absolute;bottom:72px;width:130px;opacity:0;animation:textIn .5s ease 1s forwards}
  .loader-track{width:100%;height:3px;background:var(--track-bg);border-radius:2px;overflow:hidden}
  .loader-bar{width:0%;height:100%;background:linear-gradient(90deg,var(--accent),#7db4ff);border-radius:2px;animation:loadProgress 2s cubic-bezier(.4,0,.2,1) 1.2s forwards}
  .loader-text{text-align:center;font-size:9px;letter-spacing:3px;color:var(--text-muted);margin-top:8px;font-family:'Outfit',sans-serif}
  .version{position:absolute;bottom:26px;font-size:10px;color:rgba(0,0,0,.12);letter-spacing:1px}

  @keyframes fadeIn{to{opacity:1}}
  @keyframes logoEnter{to{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes textIn{to{opacity:1;transform:translateY(0)}}
  @keyframes glowIn{0%{opacity:0;transform:scale(.6)}100%{opacity:1;transform:scale(1)}}
  @keyframes loadProgress{0%{width:0%}25%{width:40%}55%{width:70%}80%{width:88%}100%{width:100%}}
</style>
</head>
