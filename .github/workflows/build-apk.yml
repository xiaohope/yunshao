name: Build APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Make gradlew executable
      working-directory: yunshao_android_source
      run: chmod +x gradlew

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 33
        build-tools: 33.0.2

    - name: Generate release keystore
      run: |
        keytool -genkey -v -keystore yunshao_android_source/yunshao-release.keystore \
          -alias yunshao -keyalg RSA -keysize 2048 -validity 3650 \
          -storepass yunshao123 -keypass yunshao123 \
          -dname "CN=YunShao, OU=YunShao, O=YunShao, L=Beijing, ST=Beijing, C=CN"

    - name: Build Debug APK
      working-directory: yunshao_android_source
      run: ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: yunshao_android_source/app/build/outputs/apk/debug/app-debug.apk

    - name: Build Release APK
      working-directory: yunshao_android_source
      run: ./gradlew assembleRelease

    - name: Upload Release APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: yunshao_android_source/app/build/outputs/apk/release/app-release.apk
