name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x yunshao_android_source/gradlew

      - name: Generate keystore (if needed)
        run: |
          if [ ! -f yunshao_android_source/yunshao-release.keystore ]; then
            keytool -genkey -v \
              -keystore yunshao_android_source/yunshao-release.keystore \
              -alias yunshao \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass yunshao123 \
              -keypass yunshao123 \
              -dname "CN=YunShao, OU=Dev, O=YunShao, L=Beijing, ST=Beijing, C=CN"
          fi

      - name: Build debug APK
        run: |
          cd yunshao_android_source
          ./gradlew assembleDebug

      - name: Build release APK
        run: |
          cd yunshao_android_source
          ./gradlew assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: yunshao-debug-apk
          path: yunshao_android_source/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: yunshao-release-apk
          path: yunshao_android_source/app/build/outputs/apk/release/app-release.apk
